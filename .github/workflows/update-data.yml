name: Update Dashboard Data

on:
  schedule:
    # 06:00 UTC daily — runs after Google Ads Script has had time to finish
    - cron: '0 6 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  generate-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery

      - name: Authenticate with Google Cloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json" >> $GITHUB_ENV

      - name: Generate dashboard JSON files
        run: python scripts/generate_data.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: refresh dashboard data $(date -u +%Y-%m-%d)"
          git push
